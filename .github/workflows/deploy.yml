name: Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://neuro-dotcom:$HF_TOKEN@huggingface.co/spaces/neuro-dotcom/just-another-crypto-bot
          git push --force space main